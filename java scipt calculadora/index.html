<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <div class="contenedor">
        <h1>Calculadora</h1>
        
        <input type="number" id="numero1" placeholder="ingrese número 1">
        <input type="number" id="numero2" placeholder="ingrese número 2">
        
        <br><br>
        
        <button onclick="sumar()">Sumar</button>
        <button onclick="restar()">Restar</button>
        <button onclick="multiplicar()">Multiplicar</button>
        <button onclick="dividir()">Dividir</button>
        
        <h2 id="resultado">Resultado:</h2>
    </div>
    
    <script>
        // Función para sumar
        function sumar() {
            // Obtener valores de los inputs
            let num1 = Number(document.getElementById("numero1").value);
            let num2 = Number(document.getElementById("numero2").value);
            
            // Sumar
            let suma = num1 + num2;
            
            // Mostrar resultado
            document.getElementById("resultado").innerHTML = "Resultado: " + suma;
        }
        
        // Función para restar
        function restar() {
            let num1 = Number(document.getElementById("numero1").value);
            let num2 = Number(document.getElementById("numero2").value);
            let resta = num1 - num2;
            document.getElementById("resultado").innerHTML = "Resultado: " + resta;
        }
        
        // Función para multiplicar
        function multiplicar() {
            let num1 = Number(document.getElementById("numero1").value);
            let num2 = Number(document.getElementById("numero2").value);
            let multiplicacion = num1 * num2;
            document.getElementById("resultado").innerHTML = "Resultado: " + multiplicacion;
        }
        
        // Función para dividir
        function dividir() {
            let num1 = Number(document.getElementById("numero1").value);
            let num2 = Number(document.getElementById("numero2").value);
            
            // Validar división por cero
            if(num2 === 0) {
                document.getElementById("resultado").innerHTML = "Error: No se puede dividir por cero";
            } else {
                let division = num1 / num2;
                document.getElementById("resultado").innerHTML = "Resultado: " + division;
            }
        }
    </script>
</body>
</html>
